; Switch 2 wake beacon — ESP32 dongle
; Uses ESP-IDF framework with NimBLE (broadcaster-only)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; Disable the Arduino framework & Bluedroid; use NimBLE instead (smaller footprint).
board_build.embed_txtfiles =
build_flags =
    -DCONFIG_BT_NIMBLE_ENABLED=1
